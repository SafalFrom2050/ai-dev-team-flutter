<svg width="1400" height="860" viewBox="0 0 1400 860" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Sub-agent harness architecture for the AI Flutter office</title>
  <desc id="desc">A dark architecture diagram showing a provider-agnostic runtime adapter, one main chat, role contracts, specialist sub-agents, packet fallback, and repository memory.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f8fafc"/>
    </marker>
    <marker id="arrowPink" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f472b6"/>
    </marker>
    <marker id="arrowLime" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a3e635"/>
    </marker>
    <style>
      .title { font: 800 44px Inter, Segoe UI, Arial, sans-serif; fill: #ffffff; }
      .subtitle { font: 500 18px Inter, Segoe UI, Arial, sans-serif; fill: #a3a3a3; }
      .section { font: 800 12px Inter, Segoe UI, Arial, sans-serif; fill: #a3a3a3; letter-spacing: 1px; }
      .label { font: 800 21px Inter, Segoe UI, Arial, sans-serif; fill: #ffffff; }
      .body { font: 500 15px Inter, Segoe UI, Arial, sans-serif; fill: #d4d4d4; }
      .muted { font: 500 13px Inter, Segoe UI, Arial, sans-serif; fill: #a3a3a3; }
      .mono { font: 700 13px "JetBrains Mono", Consolas, monospace; fill: #ffffff; }
      .frame { fill: #050505; stroke: #2b2b2b; stroke-width: 2; }
      .panel { fill: #0a0a0a; stroke: #262626; stroke-width: 1.8; }
      .card { fill: #111111; stroke: #404040; stroke-width: 1.6; }
      .mainCard { fill: #141014; stroke: #f472b6; stroke-width: 2.4; }
      .contractCard { fill: #091216; stroke: #22d3ee; stroke-width: 2.4; }
      .memoryCard { fill: #11140c; stroke: #a3e635; stroke-width: 2.4; }
      .fallbackCard { fill: #171307; stroke: #f59e0b; stroke-width: 2.4; }
      .flow { stroke: #f8fafc; stroke-width: 2.4; marker-end: url(#arrow); }
      .pinkFlow { stroke: #f472b6; stroke-width: 2.6; marker-end: url(#arrowPink); }
      .limeFlow { stroke: #a3e635; stroke-width: 2.6; marker-end: url(#arrowLime); }
      .softFlow { stroke: #737373; stroke-width: 1.8; stroke-dasharray: 7 7; marker-end: url(#arrow); }
      .bus { stroke: #f8fafc; stroke-width: 2.2; }
      .dash { stroke: #737373; stroke-width: 1.8; stroke-dasharray: 7 7; }
    </style>
  </defs>

  <rect width="1400" height="860" rx="34" fill="#030303"/>
  <rect x="30" y="30" width="1340" height="800" rx="30" class="frame"/>

  <text x="70" y="92" class="title">Sub-Agent Harness Architecture</text>
  <text x="70" y="128" class="subtitle">The main chat stays small. Specialist agents run with narrow contracts, owned files, branches, and durable handoffs.</text>

  <g transform="translate(70 162)">
    <rect x="0" y="0" width="1260" height="118" rx="22" class="panel"/>
    <text x="30" y="35" class="section">PROVIDER-AGNOSTIC RUNTIME ADAPTER</text>
    <text x="30" y="64" class="body">Native harness first. Packet fallback when a tool cannot launch sub-agents.</text>

    <rect x="390" y="32" width="220" height="54" rx="14" class="memoryCard"/>
    <text x="500" y="58" text-anchor="middle" class="label">Antigravity 2.0</text>
    <text x="500" y="78" text-anchor="middle" class="muted">strongest current fit</text>

    <rect x="635" y="32" width="138" height="54" rx="14" class="card"/>
    <text x="704" y="64" text-anchor="middle" class="body">Codex</text>

    <rect x="793" y="32" width="150" height="54" rx="14" class="card"/>
    <text x="868" y="64" text-anchor="middle" class="body">Claude Code</text>

    <rect x="963" y="32" width="138" height="54" rx="14" class="card"/>
    <text x="1032" y="64" text-anchor="middle" class="body">Gemini</text>

    <rect x="1121" y="32" width="108" height="54" rx="14" class="card"/>
    <text x="1175" y="64" text-anchor="middle" class="body">Cursor</text>
  </g>

  <g transform="translate(80 334)">
    <rect x="0" y="0" width="300" height="126" rx="20" class="mainCard"/>
    <text x="150" y="38" text-anchor="middle" class="label">Main Chat</text>
    <text x="150" y="66" text-anchor="middle" class="body">CEO or Office Assistant</text>
    <text x="150" y="92" text-anchor="middle" class="mono">orchestrate + monitor</text>
  </g>

  <g transform="translate(550 310)">
    <rect x="0" y="0" width="300" height="174" rx="20" class="contractCard"/>
    <text x="150" y="38" text-anchor="middle" class="label">Role Contract</text>
    <text x="150" y="70" text-anchor="middle" class="body">activation banner</text>
    <text x="150" y="95" text-anchor="middle" class="body">mission + branch</text>
    <text x="150" y="120" text-anchor="middle" class="body">owned and off-limits files</text>
    <text x="150" y="145" text-anchor="middle" class="body">handoff/outbox path</text>
  </g>

  <g transform="translate(1020 340)">
    <rect x="0" y="0" width="260" height="96" rx="18" class="fallbackCard"/>
    <text x="130" y="38" text-anchor="middle" class="label">Packet Fallback</text>
    <text x="130" y="66" text-anchor="middle" class="body">same contract, pasted manually</text>
  </g>

  <line x1="380" y1="397" x2="550" y2="397" class="pinkFlow"/>
  <path d="M850 397 C920 397 946 388 1020 388" class="softFlow"/>

  <g transform="translate(70 572)">
    <rect x="0" y="0" width="1260" height="176" rx="24" class="panel"/>
    <text x="30" y="38" class="section">SPECIALIST SUB-AGENTS</text>

    <rect x="34" y="80" width="150" height="58" rx="14" class="card"/>
    <text x="109" y="105" text-anchor="middle" class="label">Product</text>
    <text x="109" y="126" text-anchor="middle" class="muted">scope</text>

    <rect x="215" y="80" width="150" height="58" rx="14" class="card"/>
    <text x="290" y="105" text-anchor="middle" class="label">Design</text>
    <text x="290" y="126" text-anchor="middle" class="muted">states</text>

    <rect x="396" y="80" width="150" height="58" rx="14" class="card"/>
    <text x="471" y="105" text-anchor="middle" class="label">Architect</text>
    <text x="471" y="126" text-anchor="middle" class="muted">plan</text>

    <rect x="577" y="80" width="150" height="58" rx="14" class="card"/>
    <text x="652" y="105" text-anchor="middle" class="label">Flutter Devs</text>
    <text x="652" y="126" text-anchor="middle" class="muted">slices</text>

    <rect x="758" y="80" width="150" height="58" rx="14" class="card"/>
    <text x="833" y="105" text-anchor="middle" class="label">QA</text>
    <text x="833" y="126" text-anchor="middle" class="muted">evidence</text>

    <rect x="939" y="80" width="150" height="58" rx="14" class="card"/>
    <text x="1014" y="105" text-anchor="middle" class="label">Review</text>
    <text x="1014" y="126" text-anchor="middle" class="muted">risk</text>

    <rect x="1134" y="80" width="76" height="58" rx="14" class="fallbackCard"/>
    <text x="1172" y="114" text-anchor="middle" class="label">main</text>
  </g>

  <path d="M700 484 V548" class="limeFlow"/>
  <line x1="179" y1="548" x2="1242" y2="548" class="bus"/>
  <path d="M179 548 V652" class="flow"/>
  <path d="M360 548 V652" class="flow"/>
  <path d="M541 548 V652" class="flow"/>
  <path d="M722 548 V652" class="flow"/>
  <path d="M903 548 V652" class="flow"/>
  <path d="M1084 548 V652" class="flow"/>
  <path d="M1089 681 H1204" class="flow"/>

  <path d="M230 460 C230 520 170 524 170 572" class="dash"/>
  <text x="116" y="524" class="muted">status stays read-only</text>

  <g transform="translate(70 772)">
    <rect x="0" y="0" width="1260" height="42" rx="14" class="panel"/>
    <text x="630" y="27" text-anchor="middle" class="body">The repo is the shared memory: docs, branches, commits, PRs, status index, handoffs, and outboxes.</text>
  </g>
</svg>
