<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AI Flutter Office round table</title>
  <desc id="desc">A simplified office map showing the CEO, Office Assistant, product, design, engineering, QA, review, and release roles around one shared table, with work flowing from idea to production main.</desc>
  <rect width="1200" height="760" rx="28" fill="#0f172a"/>
  <rect x="28" y="28" width="1144" height="704" rx="24" fill="#111827" stroke="#263244" stroke-width="2"/>

  <text x="600" y="82" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="800" fill="#f8fafc">AI Flutter Office</text>
  <text x="600" y="116" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" fill="#cbd5e1">A specialist agent team that turns an idea into production code on main</text>

  <circle cx="600" cy="372" r="168" fill="#172033" stroke="#38bdf8" stroke-width="3"/>
  <circle cx="600" cy="372" r="126" fill="#111827" stroke="#334155" stroke-width="2"/>
  <text x="600" y="348" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="800" fill="#f8fafc">Round Table</text>
  <text x="600" y="381" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" fill="#cbd5e1">shared repo memory</text>
  <text x="600" y="410" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" fill="#cbd5e1">branches, packets, handoffs</text>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <g transform="translate(86 168)">
      <rect width="238" height="92" rx="16" fill="#1e293b" stroke="#64748b"/>
      <text x="119" y="35" text-anchor="middle" font-size="20" font-weight="800" fill="#f8fafc">CEO</text>
      <text x="119" y="62" text-anchor="middle" font-size="14" fill="#cbd5e1">direction and memory</text>
    </g>

    <g transform="translate(481 150)">
      <rect width="238" height="92" rx="16" fill="#082f49" stroke="#38bdf8"/>
      <text x="119" y="35" text-anchor="middle" font-size="20" font-weight="800" fill="#f8fafc">Office Assistant</text>
      <text x="119" y="62" text-anchor="middle" font-size="14" fill="#bae6fd">triage and packets</text>
    </g>

    <g transform="translate(876 168)">
      <rect width="238" height="92" rx="16" fill="#1e293b" stroke="#64748b"/>
      <text x="119" y="35" text-anchor="middle" font-size="20" font-weight="800" fill="#f8fafc">Product Lead</text>
      <text x="119" y="62" text-anchor="middle" font-size="14" fill="#cbd5e1">brief and acceptance</text>
    </g>

    <g transform="translate(72 342)">
      <rect width="238" height="92" rx="16" fill="#1e293b" stroke="#64748b"/>
      <text x="119" y="35" text-anchor="middle" font-size="20" font-weight="800" fill="#f8fafc">UI/UX Designer</text>
      <text x="119" y="62" text-anchor="middle" font-size="14" fill="#cbd5e1">flows and contracts</text>
    </g>

    <g transform="translate(890 342)">
      <rect width="238" height="92" rx="16" fill="#1e293b" stroke="#64748b"/>
      <text x="119" y="35" text-anchor="middle" font-size="20" font-weight="800" fill="#f8fafc">Product Engineer</text>
      <text x="119" y="62" text-anchor="middle" font-size="14" fill="#cbd5e1">architecture and slices</text>
    </g>

    <g transform="translate(86 516)">
      <rect width="238" height="92" rx="16" fill="#1e293b" stroke="#64748b"/>
      <text x="119" y="35" text-anchor="middle" font-size="20" font-weight="800" fill="#f8fafc">Senior Flutter</text>
      <text x="119" y="62" text-anchor="middle" font-size="14" fill="#cbd5e1">patterns and platform risk</text>
    </g>

    <g transform="translate(347 580)">
      <rect width="238" height="92" rx="16" fill="#1e293b" stroke="#64748b"/>
      <text x="119" y="35" text-anchor="middle" font-size="20" font-weight="800" fill="#f8fafc">Junior Flutter</text>
      <text x="119" y="62" text-anchor="middle" font-size="14" fill="#cbd5e1">focused implementation</text>
    </g>

    <g transform="translate(615 580)">
      <rect width="238" height="92" rx="16" fill="#1e293b" stroke="#64748b"/>
      <text x="119" y="35" text-anchor="middle" font-size="20" font-weight="800" fill="#f8fafc">QA/Test Engineer</text>
      <text x="119" y="62" text-anchor="middle" font-size="14" fill="#cbd5e1">evidence and regression</text>
    </g>

    <g transform="translate(876 516)">
      <rect width="238" height="92" rx="16" fill="#1e293b" stroke="#64748b"/>
      <text x="119" y="35" text-anchor="middle" font-size="20" font-weight="800" fill="#f8fafc">Code Reviewer</text>
      <text x="119" y="62" text-anchor="middle" font-size="14" fill="#cbd5e1">risk and correctness</text>
    </g>

    <g transform="translate(481 40)">
      <rect x="-360" y="630" width="720" height="52" rx="14" fill="#0f766e" stroke="#5eead4"/>
      <text x="0" y="663" text-anchor="middle" font-size="17" font-weight="700" fill="#ecfeff">Idea -> packets -> branches -> handoffs -> review -> production main</text>
    </g>

    <g transform="translate(481 488)">
      <rect width="238" height="72" rx="16" fill="#312e81" stroke="#a5b4fc"/>
      <text x="119" y="31" text-anchor="middle" font-size="20" font-weight="800" fill="#f8fafc">Release Engineer</text>
      <text x="119" y="55" text-anchor="middle" font-size="14" fill="#c7d2fe">protects main</text>
    </g>
  </g>

  <g stroke="#475569" stroke-width="2" stroke-linecap="round">
    <line x1="324" y1="214" x2="472" y2="281"/>
    <line x1="600" y1="242" x2="600" y2="288"/>
    <line x1="876" y1="214" x2="728" y2="281"/>
    <line x1="310" y1="388" x2="432" y2="375"/>
    <line x1="890" y1="388" x2="768" y2="375"/>
    <line x1="324" y1="562" x2="469" y2="479"/>
    <line x1="466" y1="580" x2="532" y2="520"/>
    <line x1="734" y1="580" x2="668" y2="520"/>
    <line x1="876" y1="562" x2="731" y2="479"/>
    <line x1="600" y1="488" x2="600" y2="540"/>
  </g>
</svg>
