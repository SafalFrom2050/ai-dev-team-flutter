<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AI Flutter Office architecture</title>
  <desc id="desc">A dark architecture diagram showing how a user prompt enters the Office Assistant, becomes role packets and branch work, moves through product, design, engineering, QA, review, and release, and finally reaches production main.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f8fafc"/>
    </marker>
    <marker id="arrow-muted" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#737373"/>
    </marker>
    <style>
      .title { font: 800 36px Inter, Segoe UI, Arial, sans-serif; fill: #ffffff; }
      .subtitle { font: 500 17px Inter, Segoe UI, Arial, sans-serif; fill: #a3a3a3; }
      .label { font: 800 19px Inter, Segoe UI, Arial, sans-serif; fill: #ffffff; }
      .body { font: 500 14px Inter, Segoe UI, Arial, sans-serif; fill: #d4d4d4; }
      .small { font: 700 12px Inter, Segoe UI, Arial, sans-serif; fill: #a3a3a3; letter-spacing: 1px; }
      .mono { font: 700 13px "JetBrains Mono", Consolas, monospace; fill: #ffffff; }
      .card { fill: #111111; stroke: #3f3f46; stroke-width: 1.5; }
      .lane { fill: #0a0a0a; stroke: #262626; stroke-width: 1.5; }
      .flow { stroke: #f8fafc; stroke-width: 2.5; marker-end: url(#arrow); }
      .muted-flow { stroke: #737373; stroke-width: 2; marker-end: url(#arrow-muted); }
    </style>
  </defs>

  <rect width="1200" height="760" rx="28" fill="#050505"/>
  <rect x="30" y="30" width="1140" height="700" rx="24" fill="#080808" stroke="#262626" stroke-width="2"/>

  <text x="72" y="84" class="title">AI Flutter Office Architecture</text>
  <text x="72" y="116" class="subtitle">A tool-agnostic agent office: prompts become packets, packets become branch work, branch work becomes production code.</text>

  <g transform="translate(72 156)">
    <rect x="0" y="0" width="1056" height="112" rx="18" class="lane"/>
    <text x="28" y="34" class="small">ENTRY</text>
    <rect x="28" y="50" width="220" height="42" rx="12" fill="#18181b" stroke="#525252"/>
    <text x="138" y="77" text-anchor="middle" class="label">User prompt</text>

    <line x1="268" y1="71" x2="358" y2="71" class="flow"/>

    <rect x="378" y="24" width="302" height="68" rx="14" fill="#171717" stroke="#f472b6" stroke-width="2"/>
    <text x="529" y="54" text-anchor="middle" class="label">Office Assistant</text>
    <text x="529" y="76" text-anchor="middle" class="body">activates, triages, creates packets</text>

    <line x1="700" y1="71" x2="788" y2="71" class="flow"/>

    <rect x="808" y="24" width="220" height="68" rx="14" fill="#111111" stroke="#a3e635" stroke-width="2"/>
    <text x="918" y="54" text-anchor="middle" class="label">Role packets</text>
    <text x="918" y="76" text-anchor="middle" class="body">scoped, paste-ready tasks</text>
  </g>

  <g transform="translate(72 304)">
    <rect x="0" y="0" width="1056" height="196" rx="18" class="lane"/>
    <text x="28" y="34" class="small">OFFICE MEMORY AND PARALLEL WORK</text>

    <rect x="28" y="58" width="218" height="96" rx="14" class="card"/>
    <text x="137" y="90" text-anchor="middle" class="label">Product Lead</text>
    <text x="137" y="116" text-anchor="middle" class="body">brief, scope, acceptance</text>
    <text x="137" y="139" text-anchor="middle" class="mono">product/*</text>

    <rect x="286" y="58" width="218" height="96" rx="14" class="card"/>
    <text x="395" y="90" text-anchor="middle" class="label">UI/UX Designer</text>
    <text x="395" y="116" text-anchor="middle" class="body">flows, states, tokens</text>
    <text x="395" y="139" text-anchor="middle" class="mono">design/*</text>

    <rect x="544" y="58" width="218" height="96" rx="14" class="card"/>
    <text x="653" y="90" text-anchor="middle" class="label">Product Engineer</text>
    <text x="653" y="116" text-anchor="middle" class="body">architecture, slices</text>
    <text x="653" y="139" text-anchor="middle" class="mono">arch/*</text>

    <rect x="802" y="58" width="226" height="96" rx="14" fill="#101010" stroke="#f59e0b" stroke-width="2"/>
    <text x="915" y="90" text-anchor="middle" class="label">Repo memory</text>
    <text x="915" y="116" text-anchor="middle" class="body">docs, status, handoffs</text>
    <text x="915" y="139" text-anchor="middle" class="mono">docs/features/*</text>

    <path d="M246 106 H286" class="muted-flow"/>
    <path d="M504 106 H544" class="muted-flow"/>
    <path d="M762 106 H802" class="muted-flow"/>
  </g>

  <g transform="translate(72 536)">
    <rect x="0" y="0" width="1056" height="120" rx="18" class="lane"/>
    <text x="28" y="34" class="small">DELIVERY PIPELINE</text>

    <rect x="28" y="52" width="176" height="44" rx="12" fill="#111111" stroke="#525252"/>
    <text x="116" y="80" text-anchor="middle" class="label">Flutter Devs</text>

    <rect x="252" y="52" width="176" height="44" rx="12" fill="#111111" stroke="#525252"/>
    <text x="340" y="80" text-anchor="middle" class="label">QA/Test</text>

    <rect x="476" y="52" width="176" height="44" rx="12" fill="#111111" stroke="#525252"/>
    <text x="564" y="80" text-anchor="middle" class="label">Code Review</text>

    <rect x="700" y="52" width="176" height="44" rx="12" fill="#111111" stroke="#525252"/>
    <text x="788" y="80" text-anchor="middle" class="label">Release</text>

    <rect x="924" y="52" width="104" height="44" rx="12" fill="#1c1917" stroke="#f59e0b" stroke-width="2"/>
    <text x="976" y="80" text-anchor="middle" class="label">main</text>

    <line x1="204" y1="74" x2="252" y2="74" class="flow"/>
    <line x1="428" y1="74" x2="476" y2="74" class="flow"/>
    <line x1="652" y1="74" x2="700" y2="74" class="flow"/>
    <line x1="876" y1="74" x2="924" y2="74" class="flow"/>
  </g>

  <g transform="translate(72 684)">
    <rect x="0" y="0" width="1056" height="28" rx="10" fill="#111111" stroke="#262626"/>
    <text x="528" y="19" text-anchor="middle" class="body">Branches isolate work. Markdown packets coordinate agents. Handoffs preserve context. Release protects production.</text>
  </g>

  <path d="M990 268 V304" class="flow"/>
  <path d="M987 500 C987 516 987 520 976 536" class="flow"/>
  <path d="M600 268 C600 286 395 286 395 304" class="muted-flow"/>
  <path d="M600 268 C600 286 653 286 653 304" class="muted-flow"/>
</svg>
