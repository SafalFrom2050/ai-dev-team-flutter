<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Office Assistant activation status screenshot</title>
  <desc id="desc">A dark chat screenshot showing a user asking for the status of the latest app and the Office Assistant activating before giving a branch-aware project status.</desc>
  <rect width="1200" height="760" fill="#141414"/>
  <rect x="1" y="1" width="1198" height="758" stroke="#2b2b2b" stroke-width="2"/>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect x="760" y="52" width="360" height="54" rx="24" fill="#252525"/>
    <text x="940" y="85" text-anchor="middle" font-size="17" font-weight="700" fill="#f5f5f5">what is the status of our latest app?</text>

    <text x="58" y="190" font-size="18" font-weight="700" fill="#8f8f8f">Worked for 49s</text>
    <path d="M210 178 L221 190 L210 202" stroke="#777" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="58" y1="210" x2="1142" y2="210" stroke="#252525"/>

    <text x="58" y="258" font-size="19" font-weight="700" fill="#fafafa">Office Assistant Activated: I am your Office Assistant and responsible for analyzing tasks and producing ready-to-paste</text>
    <text x="58" y="288" font-size="19" font-weight="700" fill="#fafafa">agent packets.</text>

    <text x="58" y="334" font-size="18" font-weight="800" fill="#f5f5f5">Feature: Android Background Timer for the Minimal Timer App</text>

    <text x="58" y="374" font-size="18" font-weight="700" fill="#f5f5f5">Source of truth:</text>
    <rect x="205" y="351" width="58" height="28" rx="6" fill="#2d2d2d"/>
    <text x="234" y="371" text-anchor="middle" font-family="JetBrains Mono, Consolas, monospace" font-size="15" font-weight="800" fill="#f5f5f5">main</text>
    <text x="276" y="374" font-size="18" font-weight="700" fill="#f5f5f5">/</text>
    <rect x="294" y="351" width="350" height="28" rx="6" fill="#2d2d2d"/>
    <text x="469" y="371" text-anchor="middle" font-family="JetBrains Mono, Consolas, monospace" font-size="15" font-weight="800" fill="#f5f5f5">work/minimal-timer-app/</text>

    <text x="58" y="414" font-size="18" font-weight="700" fill="#f5f5f5">Current checkout:</text>
    <rect x="222" y="391" width="58" height="28" rx="6" fill="#2d2d2d"/>
    <text x="251" y="411" text-anchor="middle" font-family="JetBrains Mono, Consolas, monospace" font-size="15" font-weight="800" fill="#f5f5f5">main</text>
    <text x="292" y="414" font-size="18" font-weight="700" fill="#f5f5f5">tracking</text>
    <rect x="386" y="391" width="128" height="28" rx="6" fill="#2d2d2d"/>
    <text x="450" y="411" text-anchor="middle" font-family="JetBrains Mono, Consolas, monospace" font-size="15" font-weight="800" fill="#f5f5f5">origin/main</text>

    <text x="58" y="454" font-size="18" font-weight="700" fill="#f5f5f5">State: implemented on</text>
    <rect x="266" y="431" width="58" height="28" rx="6" fill="#2d2d2d"/>
    <text x="295" y="451" text-anchor="middle" font-family="JetBrains Mono, Consolas, monospace" font-size="15" font-weight="800" fill="#f5f5f5">main</text>
    <text x="336" y="454" font-size="18" font-weight="700" fill="#f5f5f5">, but not yet release-verified.</text>

    <text x="58" y="508" font-size="18" font-weight="700" fill="#f5f5f5">Done: the base Minimal Timer App is shipped to</text>
    <rect x="515" y="485" width="58" height="28" rx="6" fill="#2d2d2d"/>
    <text x="544" y="505" text-anchor="middle" font-family="JetBrains Mono, Consolas, monospace" font-size="15" font-weight="800" fill="#f5f5f5">main</text>
    <text x="586" y="508" font-size="18" font-weight="700" fill="#f5f5f5">, and Android background timer work was</text>
    <text x="58" y="538" font-size="18" font-weight="700" fill="#f5f5f5">committed with foreground-service support, Android manifest changes, service wrapper code, pubspec</text>
    <text x="58" y="568" font-size="18" font-weight="700" fill="#f5f5f5">updates, and widget test updates.</text>

    <text x="58" y="622" font-size="18" font-weight="700" fill="#f5f5f5">Open: verification is still the big gap. Manual QA has not started, and the missing handoff should be written.</text>
    <text x="58" y="652" font-size="18" font-weight="700" fill="#f5f5f5">Next: run a QA/Test Engineer pass, then Android emulator or physical-device background checks.</text>

    <text x="58" y="704" font-size="18" font-weight="800" fill="#f5f5f5">Evidence read:</text>
    <text x="204" y="704" font-size="18" font-weight="800" fill="#93c5fd">status-index.md</text>
    <text x="352" y="704" font-size="18" font-weight="800" fill="#93c5fd">handoff.md</text>
    <text x="470" y="704" font-size="18" font-weight="800" fill="#93c5fd">brief.md</text>
    <text x="560" y="704" font-size="18" font-weight="800" fill="#93c5fd">tech-plan.md</text>
  </g>
</svg>
